# Render Blueprint — sweetscoots API. Frontend draait op Netlify, Postgres op Neon.
# Deploy: Render → New → Blueprint → kies deze repo. Vul daarna de sync:false-waardes in.
# Zie HOSTING.md.
#
# Regio frankfurt = EU (GDPR + lage latency NL). plan free = gratis, maar de API valt
# na ~15 min inactiviteit in slaap (koude start ~50s bij de eerste request daarna).
services:
  # --- API (Express) → verbindt met Neon Postgres ---
  - name: sweetscoots-api
    type: web
    runtime: node
    plan: free
    region: frankfurt
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # Neon "pooled" connection string, met ?sslmode=require
      - key: GOOGLE_CLIENT_ID
        sync: false # zelfde waarde als VITE_GOOGLE_CLIENT_ID op Netlify
      - key: CORS_ORIGIN
        sync: false # de Netlify-URL, bv. https://scooternav.netlify.app (zonder trailing slash)
      # PORT wordt automatisch door Render gezet; de server leest process.env.PORT.
